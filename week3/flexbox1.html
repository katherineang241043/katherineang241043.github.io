<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Oxygen+Mono&family=Oxygen:wght@300;400;700&display=swap');

    body {
        background-color: #efe9d9;
        margin: 150px 0px;
        font-family: "Oxygen Mono", monospace;
    }

    div.all {
        display: flex;
        gap: 20px;
        margin: auto;
        max-width: 1024px;

    }

    div.img {
        background-color: #FFFFFF;
        padding: 15px;
        border-radius: 15px;
    }

    h1 {
        font-size: 22px;
        margin-bottom: -3px;
        font-family: "Oxygen", sans-serif;
    }

    p {
        font-size: 12px;
        line-height: 1.5;
    }

    div.all img {
        border-radius: 7px;
    }

    div.text {
        padding: 20px;
        margin-top: -13px;
    }

    /*.img_ins {
        display: none;
    }*/

    /*tablet screen*/
    @media screen and (max-width: 780px) {
        div.all {
            flex-direction: column;
        }

        .img {
            width: 60%;
            margin: auto;
        }
    }

    /*mobile screen*/
    @media screen and (max-width: 550px) {
        .img {
            width: 90%;
        }
    }
</style>


<body>
    <div class="all">
        <div class="img">
            <img src="images/residential projects.jpg" alt="r_projects" width="100%">
            <div class="text">
                <h1>Residential projects</h1>
                <p>We build sustainable and modem homes for comfortable living.</p>
            </div>
        </div>
        <div class="img">
            <img src="images/commercial spaces.jpg" alt="c_spaces" width="100%">
            <div class="text">
                <h1>Commercial spaces</h1>
                <p>We create efficient, inspiring workspaces for businesses of all sizes.</p>
            </div>
        </div>
        <div class="img">
            <img src="images/infrastructure works.jpg" alt="i_works" width="100%">
            <div class="text">
                <h1>Infrastructure works</h1>
                <p>We develop strong, reliable infrastructure for growing communities.</p>
            </div>
        </div>
    </div>
</body>

</html>
