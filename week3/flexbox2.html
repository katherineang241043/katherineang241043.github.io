<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positivus Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 8px 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin: 8px 16px;
        }

        div.menu_container {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        div.text {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .button {
            border: solid 1px black;
            border-radius: 10px;
            padding: 18px 35px;

        }
    </style>

</head>

<body>
    <div class="header">
        <div>
            <h1><img src="images/Vector.png" alt="vector" width="25">
                Positivus</h1>
        </div>

        <div class="menu_container">
            <div class="menu_aboutus">About us</div>
            <div class="menu_services">Services</div>
            <div class="menu_usecases">Use Cases</div>
            <div class="menu_pricing">Pricing</div>
            <div class="menu_blog">Blog</div>
            <div class="button">Request a quote</div>
        </div>
    </div>
    <div class="text">
        <div>
            <h1>Navigating the<br>digital landscape<br>for success</h1>
            <p>
                Our digital marketing agency helps businesses grow and succeed online
                through a range of services including SEO, PPC, social media marketing,
                and content creation.
            </p>
            <button class="consult_btn">Book a consultation</button>
        </div>

        <div>
            <img src="images/Illustration.png" alt="illustration" width="600.46px">
        </div>
    </div>

</body>

</html>
