<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positivus Home</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        padding: 8px 16px;
        margin: 10px 70px;
    }

    div.header {
        display: flex;
        justify-content: space-between;
        font-size: 23px;
    }

    div.menu_container {
        display: flex;
        gap: 43px;
        align-items: center;
        font-size: 18px;
        letter-spacing: 2px;
    }

    div.button_request {
        border: solid 1px black;
        border-radius: 12px;
        padding: 22px 35px;
    }

    div.text {
        display: flex;
        justify-content: space-between;
        margin-block: 40px;

    }

    div.text h1 {
        font-size: 70px;
        line-height: 1.2;

    }

    div.text p {
        margin-top: -25px;
        letter-spacing: 2px;
        line-height: 1.5;
        font-size: 18px;
    }

    div.text button {
        background-color: rgb(0, 0, 0);
        color: white;
        font-size: 22px;
        border-radius: 15px;
        margin-top: 18px;
        padding: 23px 55px;
    }

    div.apps {
        display: flex;
        justify-content: space-between;
    }

    div.apps img {
        width: 140px;
    }

    div.image {
        width: 50%;
    }

    div.text_left {
        width: 50%;
    }

    div.moblie_menu {
        display: none;
    }

    @media screen and (max-width: 1350px) {
        div.menu_container {
            display: none;
        }

        div.moblie_menu {
            display: block;
        }
    }
</style>

<body>
    <div class="header">
        <div>
            <h1><img src="images/Vector.png" alt="vector" width="33">
                Positivus</h1>
        </div>

        <div class="menu_container">
            <div class="menu_aboutus">About us</div>
            <div class="menu_services">Services</div>
            <div class="menu_usecases">Use Cases</div>
            <div class="menu_pricing">Pricing</div>
            <div class="menu_blog">Blog</div>
            <div class="button_request">Request a quote</div>
        </div>
        <div class="moblie_menu">=</div>
    </div>
    <div class="text">
        <div class="text_left">
            <h1>Navigating the digital landscape for success</h1>
            <p>
                Our digital marketing agency helps businesses grow and succeed online through a
                range of services including SEO, PPC, social media marketing,and content creation.
            </p>
            <button class="book_button">Book a consultation</button>
        </div>

        <div class="image">
            <img src="images/Illustration.png" alt="illustration" width="100%">
        </div>
    </div>

    <div class="apps">
        <div><img src="images/amazon.png" alt="amazon"></div>
        <div><img src="images/dribbble.png" alt="dribbble"></div>
        <div><img src="images/hubspot.png" alt="hubspot"></div>
        <div><img src="images/notion.png" alt="notion"></div>
        <div><img src="images/netflix.png" alt="netflix"></div>
        <div><img src="images/zoom.png" alt="zoom"></div>
    </div>
</body>

</html>
