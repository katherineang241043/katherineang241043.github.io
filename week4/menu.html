<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Menu</title>
</head>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

    body {
        font-family: "Roboto", sans-serif;
        margin: 0px;

    }

    div.header {
        background-color: rgb(255, 253, 251);
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        padding: 5px 30px;
    }

    div.menu_container {
        display: flex;
        gap: 30px;
        align-items: center;
        font-size: 15px;
    }

    div.menu_services {
        color: rgb(255, 85, 0);
    }

    div.contact {
        display: flex;
        gap: 13px;
        align-items: center;
        font-size: 15px;
        font-weight: bold;
    }

    div.contact button {
        color: white;
        background-color: rgb(248, 101, 27);
        font-size: 13px;
        border: none;
        font-weight: bold;
        padding: 13px 18px;
        border-radius: 8px;
        margin: 10px;
    }

    img.phone_icon {
        margin: auto;
        width: 25px;
    }

    img.burger_menu {
        display: none;
        margin: auto;
        width: 50px;
    }

    @media screen and (max-width: 1060px) {
        div.menu_container {
            display: none;
        }

        img.burger_menu {
            display: block;
        }

        div.contact button {
            display: none;
        }
    }

    @media screen and (max-width: 700px) {
        div.phone_number {
            display: none;
        }

        img.phone_icon {
            display: none;
        }
    }
</style>

<body>
    <div class="header">
        <div><img src="images/logo.png" alt="vector" width="200"></div>

        <div class="menu_container">
            <div class="menu_home">Home</div>
            <div class="menu_services">Services</div>
            <div class="menu_work">Work</div>
            <div class="menu_project datails">Project Datails</div>
            <div class="menu_contact">Contact</div>
        </div>
        <div class="contact">
            <div><img class="phone_icon" src="images/phone_icon.png" alt="phone_icon" width="100%"></div>
            <div class="phone_number">555-123-4567</div>
            <div><button class="contact_button">Contact</button></div>
            <div><img class="burger_menu" src="images/burger_menu.png" alt="burger_menu" width="100%"></div>
        </div>
    </div>
</body>

</html>
