<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 2</title>
    <link rel="stylesheet" href="css/relative-travel.css">
</head>

<body>
    <div class="travel_card">
        <div class="card">
            <div class="image">
                <img src="images/tokyo.jpg" alt="Tokyo" width="100%">
            </div>

            <div class="card_content">
                <h3>Tokyo</h3>
                <p class="info">14-29 Jun | by Fujii Kaze</p>

                <div class="icon_group">
                    <div class="icon">
                        <img src="images/building.png" alt="building" width="100%" class="icon_img">
                    </div>
                    <div class="icon">
                        <img src="images/map.png" alt="map" width="100%" class="icon_img">
                    </div>
                    <div class="icon">
                        <img src="images/compass.png" alt="compass" width="100%" class="icon_img">
                    </div>
                </div>

                <div class="footer">
                    <div class="people">
                        <img src="images/high-five.png" alt="high-five" width="100%">
                        <span>24 people going</span>
                    </div>
                    <div class="like">
                        <img src="images/heart.png" alt="like" width="100%">
                    </div>
                </div>
            </div>

            <div class="container">
                <img src="images/hirono.jpg" alt="fujii" width="100%" class="hirono">
                <div class="info">
                    <span class="status">On going</span>
                    <p class="title">Trip to Tokyo</p>
                    <div class="progress">
                        <p class="progress_text"><span>40% </span>completed</p>
                        <div class="progress_bar">
                            <div class="progress_fill"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="image">
                <img src="images/osaka.jpg" alt="Osaka" width="100%">
            </div>

            <div class="card_content">
                <h3>Osaka</h3>
                <p class="info">10-25 Jun | by Fujii Kaze</p>

                <div class="icon_group">
                    <div class="icon">
                        <img src="images/building.png" alt="building" width="100%" class="icon_img">
                    </div>
                    <div class="icon">
                        <img src="images/map.png" alt="map" width="100%" class="icon_img">
                    </div>
                    <div class="icon">
                        <img src="images/compass.png" alt="compass" width="100%" class="icon_img">
                    </div>
                </div>

                <div class="footer">
                    <div class="people">
                        <img src="images/high-five.png" alt="high-five" width="100%">
                        <span>21 people going</span>
                    </div>
                    <div class="like">
                        <img src="images/heart.png" alt="like" width="100%">
                    </div>
                </div>
            </div>

            <div class="container">
                <img src="images/hirono.jpg" alt="fujii" width="100%" class="hirono">
                <div class="info">
                    <span class="status">On going</span>
                    <p class="title">Trip to Tokyo</p>
                    <div class="progress">
                        <p class="progress_text"><span>40% </span>completed</p>
                        <div class="progress_bar">
                            <div class="progress_fill"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
